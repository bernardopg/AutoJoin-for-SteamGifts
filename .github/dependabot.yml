version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "bernardopg"
    assignees:
      - "bernardopg"
    labels:
      - "dependencies"
    versioning-strategy: "increase-if-necessary"
    ignore:
      # eslint-config-airbnb-base only supports eslint ^7 or ^8.
      # Block major eslint upgrades until the config supports them.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Prevent unexpected breaking changes in other dev dependencies
      - dependency-name: "eslint-config-airbnb-base"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-import"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prettier"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "bernardopg"
    assignees:
      - "bernardopg"
    labels:
      - "dependencies"
      - "github-actions"
