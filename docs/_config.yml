title: AutoJoin for SteamGifts
description: 🎮 Extensão automática para participar de sorteios no SteamGifts
author: bernardopg
url: https://bernardopg.github.io
baseurl: /AutoJoin-for-SteamGifts

# Theme
theme: jekyll-theme-primer

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Navigation
navigation:
  - title: Home
    url: /
  - title: Installation
    url: /installation/
  - title: Contributing
    url: /contributing/
  - title: GitHub
    url: https://github.com/bernardopg/AutoJoin-for-SteamGifts
    external: true
